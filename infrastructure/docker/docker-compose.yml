version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: corecon-postgres
    environment:
      POSTGRES_DB: corecon
      POSTGRES_USER: corecon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corecon"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corecon-network

  redis:
    image: redis:7-alpine
    container_name: corecon-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corecon-network

  minio:
    image: minio/minio:latest
    container_name: corecon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-corecon}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - corecon-network

  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: corecon-api
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: corecon
      DB_USER: corecon
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-corecon}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme}
      MINIO_BUCKET: corecon-photos
      MINIO_USE_SSL: "false"
      CLEANER_APP_URL: https://cleaner.corecon.us
      ADMIN_PANEL_URL: https://admin.corecon.us
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "4000:4000"
    networks:
      - corecon-network

  bull-worker:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: corecon-worker
    command: node dist/queues/worker.js
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: corecon
      DB_USER: corecon
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - corecon-network

  admin-panel:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.admin
    container_name: corecon-admin
    environment:
      VITE_API_URL: https://api.corecon.us
    ports:
      - "5174:80"
    depends_on:
      - api
    networks:
      - corecon-network

  cleaner-app:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.cleaner
    container_name: corecon-cleaner
    environment:
      VITE_API_URL: https://api.corecon.us
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - corecon-network

  nginx:
    image: nginx:alpine
    container_name: corecon-nginx
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/sites:/etc/nginx/sites:ro
      - certbot_data:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - admin-panel
      - cleaner-app
    networks:
      - corecon-network

networks:
  corecon-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_data:
