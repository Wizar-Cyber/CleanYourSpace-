version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: corecon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: corecon
      POSTGRES_USER: corecon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corecon"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corecon-network

  redis:
    image: redis:7-alpine
    container_name: corecon-redis
    command: redis-server --appendonly yes
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corecon-network

  minio:
    image: minio/minio:latest
    container_name: corecon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-corecon}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - corecon-network

  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: corecon-api
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      NODE_OPTIONS: "--max-old-space-size=512"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "4000:4000"
    networks:
      - corecon-network

  bull-worker:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: corecon-worker
    command: node dist/queues/worker.js
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=512"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - corecon-network

  admin-panel:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.admin
    container_name: corecon-admin
    restart: unless-stopped
    environment:
      VITE_API_URL: https://api.corecon.us
    ports:
      - "5174:80"
    depends_on:
      - api
    networks:
      - corecon-network

  cleaner-app:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.cleaner
    container_name: corecon-cleaner
    restart: unless-stopped
    environment:
      VITE_API_URL: https://api.corecon.us
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - corecon-network

  nginx:
    image: nginx:alpine
    container_name: corecon-nginx
    restart: unless-stopped
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/sites:/etc/nginx/sites:ro
      - certbot_data:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - admin-panel
      - cleaner-app
    networks:
      - corecon-network

networks:
  corecon-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_data:
